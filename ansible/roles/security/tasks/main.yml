---
- name: Ensure SSH password authentication is disabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: Restart sshd

- name: Configure SSH root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    state: present
  notify: Restart sshd

- name: Ensure SSH PubkeyAuthentication is enabled
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: 'PubkeyAuthentication yes'
    state: present
  notify: Restart sshd

- name: Install and configure fail2ban
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 5
      bantime = 1d
  notify: Restart fail2ban

- name: Ensure fail2ban is started and enabled
  service:
    name: fail2ban
    state: started
    enabled: yes


- name: Configure UFW default policies
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: 'incoming', policy: 'deny' }
    - { direction: 'outgoing', policy: 'allow' }

- name: Allow incoming SSH port (bootstrap fallback)
  ufw:
    rule: allow
    port: "{{ ssh_port | default(22) }}"
    proto: tcp
    comment: "Allow SSH bootstrap port"

- name: Allow incoming HTTP traffic for Nginx Proxy Manager
  ufw:
    rule: allow
    port: '80'
    proto: tcp
    comment: "Allow HTTP reverse proxy"

- name: Allow incoming HTTPS traffic for Nginx Proxy Manager
  ufw:
    rule: allow
    port: '443'
    proto: tcp
    comment: "Allow HTTPS reverse proxy"


- name: Allow all traffic on Tailscale interface (tailscale0)
  ufw:
    rule: allow
    interface: tailscale0
    direction: in
    comment: "Allow full trust on Tailscale interface"

- name: Allow all traffic from Docker network subnets
  ufw:
    rule: allow
    src: '172.16.0.0/12'
    comment: "Allow Docker network traffic"

- name: Enable UFW firewall
  ufw:
    state: enabled
