---
- name: Download Tailscale official GPG key
  get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Add Tailscale APT repository
  deb822_repository:
    name: tailscale
    types: deb
    uris: https://pkgs.tailscale.com/stable/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /usr/share/keyrings/tailscale-archive-keyring.gpg
    state: present

- name: Install Tailscale
  apt:
    name: tailscale
    state: present
    update_cache: yes

- name: Ensure Tailscale service is started and enabled
  service:
    name: tailscaled
    state: started
    enabled: yes

- name: Check Tailscale login status
  command: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Parse Tailscale connection state
  set_fact:
    tailscale_connected: "{{ (tailscale_status.stdout | from_json).BackendState == 'Running' }}"
  when: tailscale_status.rc == 0

- name: Authenticate Tailscale with auth key (if key provided and not already connected)
  command: "tailscale up --authkey={{ tailscale_auth_key }} --ssh={{ 'true' if (tailscale_ssh | default(true) | bool) else 'false' }}"
  when:
    - tailscale_auth_key is defined
    - tailscale_auth_key | length > 0
    - not tailscale_connected | default(false)
  no_log: true

- name: Print manual authentication message if no key provided
  debug:
    msg: "Tailscale is installed but no tailscale_auth_key was provided. Please run 'sudo tailscale up --ssh' manually on the server to authenticate."
  when:
    - tailscale_auth_key is not defined or tailscale_auth_key | length == 0
    - not tailscale_connected | default(false)
