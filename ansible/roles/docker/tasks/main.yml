---
- name: Install prerequisites for Docker repository
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Create directory for Docker APT keyring
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker APT repository
  deb822_repository:
    name: docker
    types: deb
    uris: https://download.docker.com/linux/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: stable
    architectures: "{{ 'amd64' if ansible_facts['architecture'] in ['x86_64', 'amd64'] else 'arm64' }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Install Docker CE and Compose plugin
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: yes

- name: Add target user to the docker group
  user:
    name: "{{ target_user }}"
    groups: docker
    append: yes

- name: Ensure Coolify directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: "9999"
    group: "9999"
    mode: '0755'
  loop:
    - /data/coolify
    - /data/coolify/source
    - /data/coolify/ssh
    - /data/coolify/applications
    - /data/coolify/databases
    - /data/coolify/services
    - /data/coolify/backups

- name: Check if Coolify .env exists
  stat:
    path: /data/coolify/source/.env
  register: coolify_env_stat

- name: Download and generate Coolify .env file
  block:
    - name: Download Coolify .env template
      get_url:
        url: https://cdn.coollabs.io/coolify/.env.production
        dest: /data/coolify/source/.env
        owner: "9999"
        group: "9999"
        mode: '0600'

    - name: Generate random APP_ID
      shell: sed -i "s|APP_ID=.*|APP_ID=$(openssl rand -hex 16)|g" /data/coolify/source/.env

    - name: Generate random APP_KEY
      shell: sed -i "s|APP_KEY=.*|APP_KEY=base64:$(openssl rand -base64 32)|g" /data/coolify/source/.env

    - name: Generate random DB_PASSWORD
      shell: sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=$(openssl rand -base64 24)|g" /data/coolify/source/.env

    - name: Generate random REDIS_PASSWORD
      shell: sed -i "s|REDIS_PASSWORD=.*|REDIS_PASSWORD=$(openssl rand -base64 24)|g" /data/coolify/source/.env

    - name: Generate random PUSHER_APP_ID
      shell: sed -i "s|PUSHER_APP_ID=.*|PUSHER_APP_ID=$(openssl rand -hex 16)|g" /data/coolify/source/.env

    - name: Generate random PUSHER_APP_KEY
      shell: sed -i "s|PUSHER_APP_KEY=.*|PUSHER_APP_KEY=$(openssl rand -base64 24)|g" /data/coolify/source/.env

    - name: Generate random PUSHER_APP_SECRET
      shell: sed -i "s|PUSHER_APP_SECRET=.*|PUSHER_APP_SECRET=$(openssl rand -base64 24)|g" /data/coolify/source/.env
  when: not coolify_env_stat.stat.exists

- name: Copy docker-compose configurations to target server
  copy:
    src: "{{ playbook_dir }}/../docker/"
    dest: "{{ docker_base_dir }}/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0755'

- name: Create symlink for Coolify .env
  file:
    src: /data/coolify/source/.env
    dest: "{{ docker_base_dir }}/coolify/.env"
    state: link
    force: yes
    owner: "{{ target_user }}"
    group: "{{ target_user }}"



