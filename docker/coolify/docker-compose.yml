services:
  coolify:
    image: ghcr.io/coollabsio/coolify:latest
    container_name: coolify
    restart: unless-stopped
    working_dir: /var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/coolify/source/.env:/var/www/html/.env:ro
      - /data/coolify/ssh:/var/www/html/storage/app/ssh
      - /data/coolify/applications:/var/www/html/storage/app/applications
      - /data/coolify/databases:/var/www/html/storage/app/databases
      - /data/coolify/services:/var/www/html/storage/app/services
      - /data/coolify/backups:/var/www/html/storage/app/backups
    environment:
      - APP_ENV=production
      - PHP_MEMORY_LIMIT=256M
    env_file:
      - /data/coolify/source/.env
    ports:
      # Securely bind to interface for Tailscale/VPN access (protected by UFW)
      - "8000:8080"
    expose:
      - "8000"
    healthcheck:
      test: curl --fail http://127.0.0.1:8080/api/health || exit 1
      interval: 10s
      retries: 5
      timeout: 2s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_healthy
    networks:
      - coolify-net

  postgres:
    image: postgres:15-alpine
    container_name: coolify-db
    restart: unless-stopped
    volumes:
      - coolify-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-coolify}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coolify_secure_pass}
      POSTGRES_DB: ${DB_DATABASE:-coolify}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-coolify} -d ${DB_DATABASE:-coolify}"]
      interval: 5s
      retries: 5
      timeout: 2s
    networks:
      - coolify-net

  redis:
    image: redis:7-alpine
    container_name: coolify-redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-coolify_redis_secure_pass}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-coolify_redis_secure_pass}
    volumes:
      - coolify-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 2s
    networks:
      - coolify-net

  soketi:
    image: ghcr.io/coollabsio/coolify-realtime:1.0.16
    container_name: coolify-realtime
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:6001:6001"
      - "127.0.0.1:6002:6002"
    volumes:
      - /data/coolify/ssh:/var/www/html/storage/app/ssh
    environment:
      APP_NAME: "${APP_NAME:-Coolify}"
      SOKETI_DEBUG: "${SOKETI_DEBUG:-false}"
      SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID:-coolify}"
      SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY:-coolify}"
      SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET:-coolify}"
      SOKETI_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6001/ready && wget -qO- http://127.0.0.1:6002/ready || exit 1"]
      interval: 10s
      retries: 5
      timeout: 2s
    networks:
      - coolify-net
    depends_on:
      - postgres
      - redis

volumes:
  coolify-db-data:
    name: coolify-db
  coolify-redis-data:
    name: coolify-redis

networks:
  coolify-net:
    name: coolify
    driver: bridge
