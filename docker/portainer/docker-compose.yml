services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    command: -H unix:///var/run/docker.sock
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      # Securely bind to interfaces (access allowed via Tailscale, blocked by UFW on public IP)
      - "9443:9443"
      - "9000:9000"

volumes:
  portainer_data:
    name: portainer_data
