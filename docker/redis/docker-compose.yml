services:
  redis:
    image: redis:7-alpine
    container_name: core-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_core_secure_password_here} --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    ports:
      # Expose only to loopback for security.
      - "127.0.0.1:6379:6379"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_core_secure_password_here}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redisdata:
    name: redisdata_core

networks:
  homelab-net:
    name: homelab-net
    driver: bridge
