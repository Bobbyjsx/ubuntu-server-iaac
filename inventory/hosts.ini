[home_servers]
# Replace with your home server's local IP or hostname during bootstrap,
# or its Tailscale IP once Tailscale is configured.
home-server ansible_host=192.168.1.100 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[home_servers:vars]
# System configuration
target_user=ubuntu
ssh_port=22

# Tailscale settings
# You can generate an auth key in the Tailscale admin console: https://login.tailscale.com/admin/settings/keys
# It is recommended to pass this as an extra var at runtime (e.g. --extra-vars "tailscale_auth_key=tskey-auth-...")
# tailscale_auth_key=tskey-auth-oknK...
tailscale_ssh=true

# Docker Directory Setup
docker_base_dir=/opt/docker
